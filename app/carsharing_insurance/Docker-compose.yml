services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:7000
    ports:
      - "7000:7000"
    depends_on:
      - redis
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=insurance
      - DB_USER=postgres
      - DB_PASSWORD=0000
      - REDIS_HOST=redis

  ml_service:
    build:
      context: .
      dockerfile: insurance/Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: insurance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 0000
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata: